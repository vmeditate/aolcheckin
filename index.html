<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Art of Living · Event Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #FDF6F0;
    --card: #FFFFFF;
    --border: #E8DDD5;
    --text: #2C2C2C;
    --text-muted: #888;
    --accent: #C0622F;
    --accent-light: #F4E8DF;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .screen { display: none; }
  .screen.active { display: block; }
  #screen-setup { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1.25rem; }
  #screen-setup.active { display: flex; }

  .setup-hero { text-align: center; margin-bottom: 1.5rem; }
  .aol-logo { width: 140px; height: auto; display: block; margin: 0 auto 12px; }
  .setup-hero h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .setup-hero p  { font-size: 14px; color: var(--text-muted); }
  .setup-box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 420px; }
  .field { margin-bottom: 1.1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .field input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: #BFB0A8; }
  .btn-start { width: 100%; max-width: 420px; margin-top: 1rem; padding: 13px; background: var(--accent); border: none; border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; }
  .btn-start:active { opacity: 0.85; }
  .btn-start:disabled { opacity: 0.6; cursor: not-allowed; }

  .top-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 13px 1.25rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
  .top-bar .logo { font-size: 22px; }
  .top-bar-text { flex: 1; }
  .top-bar h1 { font-size: 15px; font-weight: 700; }
  .top-bar .event-code { font-size: 11px; color: var(--text-muted); }
  .vol-chip { background: var(--accent-light); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--accent); cursor: pointer; white-space: nowrap; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }

  .main-body { padding: 0.75rem 1rem; }

  .counts-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 0; margin-bottom: 0; position: sticky; top: 49px; z-index: 19; background: var(--card); border-bottom: 1px solid var(--border); padding: 6px 1rem; }
  .count-cell { background: var(--card); border: none; border-right: 1px solid var(--border); padding: 5px 4px; text-align: center; } .count-cell:last-child { border-right: none; }
  .count-cell .c-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 2px; }
  .count-cell .c-num { font-size: 18px; font-weight: 700; color: var(--text); }

  .action-row { display: flex; gap: 6px; margin-bottom: 0.75rem; }
  .action-btn { flex: 1; padding: 9px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--card); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; text-align: center; }
  .action-btn:active { background: var(--accent-light); }
  .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-wrap input { width: 100%; padding: 11px 40px 11px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text); background: var(--card); outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: #BFB0A8; }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text-muted); cursor: pointer; display: none; background: none; border: none; padding: 4px; line-height: 1; }
  .clear-btn.visible { display: block; }

  .guest-list { display: flex; flex-direction: column; gap: 10px; }
  .guest-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .guest-card.is-marked { background: #EBF3FF; border-color: #90B8F0; }
  .g-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .g-meta-line { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
  .g-meta-line span { font-weight: 600; color: var(--text); }
  .g-wristband { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 12px; letter-spacing: 0.01em; }
  .g-wristband .wb-label { font-weight: 400; font-size: 13px; color: var(--text-muted); }
  .g-status-tag { display: inline-block; font-size: 13px; font-weight: 800; padding: 4px 12px; border-radius: 6px; margin-bottom: 8px; background: #FFE500; color: #333; letter-spacing: 0.01em; }
  .g-by { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .g-by strong { color: var(--text); }
  .toggle-row { display: flex; gap: 6px; border-top: 1px solid var(--border); padding-top: 10px; }
  .tog { flex: 1; padding: 9px 4px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; color: var(--text-muted); text-align: center; transition: all 0.15s; }
  .tog:active { opacity: 0.8; }
  .tog.on-arrived   { background: #E8F5E9; border-color: #66BB6A; color: #2E7D32; }
  .tog.on-noshow    { background: #FEECEC; border-color: #EF9A9A; color: #B71C1C; }
  .tog.on-cancelled { background: #FFF8E1; border-color: #FFD54F; color: #795548; }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; line-height: 1.7; }
  .prompt-msg { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 14px; }

  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; font-size: 13px; font-weight: 600; padding: 9px 20px; border-radius: 30px; z-index: 999; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { background: #388E3C; }
  #toast.error   { background: #C62828; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="screen active">
  <div class="setup-hero">
    <img src="aol_logo.png" alt="Art of Living" class="aol-logo"/>
    <h1>Event Check-In</h1>
    <p>Volunteer Portal</p>
  </div>
  <div class="setup-box">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="inp-vol" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Event Code</label>
      <input type="text" id="inp-code" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
    </div>
  </div>
  <button class="btn-start" id="btn-start" onclick="startApp()">Start Check-In 🌸</button>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="top-bar">
    <span class="logo">🪷</span>
    <div class="top-bar-text">
      <h1>Event Check-In</h1>
      <div class="event-code" id="event-code-label"></div>
    </div>
    <div class="vol-chip" id="vol-chip" onclick="changeSetup()">👤 <span id="vol-name-label"></span></div>
  </div>

  <div class="counts-row">
    <div class="count-cell"><div class="c-lbl">Arrived</div><div class="c-num" id="ct-arrived">—</div></div>
    <div class="count-cell"><div class="c-lbl">Remaining</div><div class="c-num" id="ct-remaining">—</div></div>
    <div class="count-cell"><div class="c-lbl">No Show</div><div class="c-num" id="ct-noshow">—</div></div>
    <div class="count-cell"><div class="c-lbl">Cancelled</div><div class="c-num" id="ct-cancelled">—</div></div>
  </div>

  <div class="main-body">
    <div class="action-row">
      <button class="action-btn" id="btn-counts" onclick="refreshCounts()">⚡ Latest counts</button>
      <button class="action-btn" id="btn-refresh" onclick="refreshList()">🔄 Refresh list</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="search" placeholder="Type a name to search…" oninput="onSearch(this.value)" autocomplete="off"/>
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
    </div>

    <div class="guest-list" id="guest-list">
      <div class="prompt-msg">Type a name above to find a guest.</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let vol = '', url = '', guests = [], eventCode = '';

// ── SETUP ──
async function startApp() {
  vol = document.getElementById('inp-vol').value.trim();
  const code = document.getElementById('inp-code').value.trim().toLowerCase();
  if (!vol) { alert('Please enter your name.'); return; }
  if (!code) { alert('Please enter the event code.'); return; }

  const btn = document.getElementById('btn-start');
  btn.textContent = 'Connecting...';
  btn.disabled = true;

  try {
    const base = window.location.href.split('?')[0].replace(/\/[^/]*$/, '/');
    const res = await fetch(base + 'config.json?t=' + Date.now());
    if (!res.ok) throw new Error('Config not found');
    const config = await res.json();
    url = config.events[code];
    if (!url) {
      alert('Event code "' + code + '" not found.\nPlease check with your organizer.');
      btn.textContent = 'Start Check-In 🌸';
      btn.disabled = false;
      return;
    }
    eventCode = code;
    localStorage.setItem('aol_vol', vol);
    localStorage.setItem('aol_code', code);
    document.getElementById('vol-name-label').textContent = vol;
    document.getElementById('event-code-label').textContent = code;
    switchScreen('screen-main');
    refreshList();
  } catch(e) {
    alert('Could not load event config. Check your connection and try again.');
    btn.textContent = 'Start Check-In 🌸';
    btn.disabled = false;
  }
}

function changeSetup() {
  if (confirm('Go back to setup screen?')) {
    url = '';
    eventCode = '';
    switchScreen('screen-setup');
  }
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Restore saved values on load
(function() {
  const sv = localStorage.getItem('aol_vol');
  const sc = localStorage.getItem('aol_code');
  if (sv) document.getElementById('inp-vol').value = sv;
  if (sc) document.getElementById('inp-code').value = sc;
})();

// ── API ──
async function api(params) {
  const r = await fetch(url + '?' + new URLSearchParams(params));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function refreshList() {
  const btn = document.getElementById('btn-refresh');
  btn.innerHTML = '<span class="spinner"></span> Loading…';
  btn.disabled = true;
  const el = document.getElementById('guest-list');
  el.innerHTML = '<div class="empty"><span class="spinner"></span> Loading guests…</div>';
  try {
    const d = await api({ action: 'getGuests' });
    guests = (d.guests || []).map(g => ({
      ...g,
      arrived:   g.arrived   === true || g.arrived   === 1 || g.arrived   === '1' || g.arrived   === 'TRUE',
      noshow:    g.noshow    === true || g.noshow    === 1 || g.noshow    === '1' || g.noshow    === 'TRUE',
      cancelled: g.cancelled === true || g.cancelled === 1 || g.cancelled === '1' || g.cancelled === 'TRUE',
    }));
    const total     = guests.length;
    const arrived   = guests.filter(g => g.arrived).length;
    const noshow    = guests.filter(g => g.noshow).length;
    const cancelled = guests.filter(g => g.cancelled).length;
    const remaining = total - arrived - noshow - cancelled;
    document.getElementById('ct-arrived').textContent   = arrived;
    document.getElementById('ct-remaining').textContent = remaining;
    document.getElementById('ct-noshow').textContent    = noshow;
    document.getElementById('ct-cancelled').textContent = cancelled;
    const q = document.getElementById('search').value.trim();
    if (q) renderSearch(q);
    else el.innerHTML = '<div class="prompt-msg">Type a name above to find a guest.</div>';
    toast('Refreshed ✓', 'success');
  } catch(e) {
    el.innerHTML = '<div class="empty">Could not load guests.<br>Check your event code or connection.</div>';
    toast('Load failed', 'error');
  }
  btn.innerHTML = '🔄 Refresh list';
  btn.disabled = false;
}

async function refreshCounts() {
  const btn = document.getElementById('btn-counts');
  btn.innerHTML = '<span class="spinner"></span> Fetching…';
  btn.disabled = true;
  try {
    const d = await api({ action: 'getCounts' });
    document.getElementById('ct-arrived').textContent   = d.arrived   ?? '—';
    document.getElementById('ct-remaining').textContent = d.remaining ?? '—';
    document.getElementById('ct-noshow').textContent    = d.noshow    ?? '—';
    document.getElementById('ct-cancelled').textContent = d.cancelled ?? '—';
    toast('Counts refreshed ✓', 'success');
  } catch(e) { toast('Could not fetch counts', 'error'); }
  btn.innerHTML = '⚡ Latest counts';
  btn.disabled = false;
}

// ── SEARCH ──
function onSearch(val) {
  document.getElementById('clear-btn').classList.toggle('visible', val.length > 0);
  if (!val.trim()) {
    document.getElementById('guest-list').innerHTML = '<div class="prompt-msg">Type a name above to find a guest.</div>';
    return;
  }
  renderSearch(val.trim());
}

function clearSearch() {
  const inp = document.getElementById('search');
  inp.value = '';
  document.getElementById('clear-btn').classList.remove('visible');
  document.getElementById('guest-list').innerHTML = '<div class="prompt-msg">Type a name above to find a guest.</div>';
  inp.focus();
}

// ── SCORING: first name prefix beats last name prefix ──
function scoreMatch(name, query) {
  const n = name.toLowerCase().trim();
  const q = query.toLowerCase().trim();
  if (!q) return 0;
  const nameParts = n.split(/\s+/);
  const queryParts = q.split(/\s+/).filter(Boolean);

  // Exact full name match
  if (n === q) return 100;

  // Every query word matches a full name part exactly
  if (queryParts.every(qw => nameParts.some(np => np === qw))) return 95;

  // Every query word matches the START of the first name → highest prefix rank
  if (queryParts.every(qw => nameParts[0].startsWith(qw))) return 92;

  // Every query word matches the start of any name part (last/middle name match)
  if (queryParts.every(qw => nameParts.some(np => np.startsWith(qw)))) return 88;

  // Every query word appears somewhere inside a name part
  if (queryParts.every(qw => nameParts.some(np => np.includes(qw)))) return 85;

  // Full query string appears anywhere in the full name
  if (n.includes(q)) return 82;

  // Query appears inside any name part
  if (nameParts.some(np => np.includes(q))) return 65;

  // Fuzzy / typo tolerance
  for (const qw of queryParts) {
    if (qw.length < 3) continue;
    const maxDist = qw.length <= 5 ? 1 : 2;
    for (const np of nameParts) {
      if (Math.abs(np.length - qw.length) <= maxDist + 1) {
        if (editDistance(np, qw) <= maxDist) return 55;
      }
    }
  }

  // Partial query word match across parts
  if (queryParts.some(qw => qw.length >= 3 && n.includes(qw))) return 50;

  return 0;
}

function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = [i];
    for (let j = 1; j <= n; j++) dp[i][j] = i === 0 ? j : 0;
  }
  for (let j = 1; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = [i];
    for (let j = 1; j <= n; j++) dp[i][j] = i === 0 ? j : 0;
  }
  for (let j = 1; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function renderSearch(query) {
  const el = document.getElementById('guest-list');
  if (!guests.length) {
    el.innerHTML = '<div class="empty">Guest list not loaded yet.<br>Tap Refresh list first.</div>';
    return;
  }
  const scored = guests
    .map(g => ({ g, score: scoreMatch(g.name, query) }))
    .filter(x => x.score >= 50)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);
  if (!scored.length) {
    el.innerHTML = '<div class="empty">No guest found matching <strong>"' + esc(query) + '"</strong>.<br>Try a different spelling.</div>';
    return;
  }
  el.innerHTML = scored.map(x => gCard(x.g)).join('');
}

function gCard(g) {
  const type = g.guestType || 'N/A';
  const tier = g.tier || 'N/A';
  const wb   = g.wristband || 'N/A';
  const isMarked = !!(g.arrived || g.noshow || g.cancelled);
  const markedClass = isMarked ? 'is-marked' : '';
  let statusTag = '';
  if (g.arrived)        statusTag = '<div class="g-status-tag">✓ Marked as Arrived</div>';
  else if (g.noshow)    statusTag = '<div class="g-status-tag">✗ Marked as No Show</div>';
  else if (g.cancelled) statusTag = '<div class="g-status-tag">✗ Marked as Cancelled</div>';
  const byLine = g.checkedInBy
    ? `<div class="g-by">By <strong>${esc(g.checkedInBy)}</strong></div>` : '';
  return `
  <div class="guest-card ${markedClass}" id="gc-${g.row}">
    <div class="g-name">${esc(g.name)}</div>
    <div class="g-meta-line">Category: <span>${esc(type)}</span> &nbsp;·&nbsp; Group: <span>${esc(tier)}</span></div>
    <div class="g-wristband"><span class="wb-label">Wristband: </span>${esc(wb)}</div>
    ${statusTag}
    ${byLine}
    <div class="toggle-row">
      <div class="tog ${g.arrived ? 'on-arrived' : ''}" onclick="toggle(${g.row},'arrived')">Arrived</div>
      <div class="tog ${g.noshow ? 'on-noshow' : ''}" onclick="toggle(${g.row},'noshow')">No Show</div>
      <div class="tog ${g.cancelled ? 'on-cancelled' : ''}" onclick="toggle(${g.row},'cancelled')">Cancelled</div>
    </div>
  </div>`;
}

async function toggle(row, field) {
  const g = guests.find(x => x.row === row);
  if (!g) return;
  const newVal = !g[field];
  g.arrived = false; g.noshow = false; g.cancelled = false;
  g[field] = newVal;
  if (newVal) {
    const existing = g.checkedInBy ? g.checkedInBy.split(',').map(n => n.trim()) : [];
    if (!existing.includes(vol)) existing.push(vol);
    g.checkedInBy = existing.join(', ');
  } else {
    g.checkedInBy = '';
  }
  const q = document.getElementById('search').value.trim();
  if (q) renderSearch(q);
  toast('Saving…');
  try {
    await api({ action: 'updateStatus', row, arrived: g.arrived?1:0, noshow: g.noshow?1:0, cancelled: g.cancelled?1:0, checkedInBy: g.checkedInBy });
    toast(newVal ? 'Saved ✓' : 'Cleared ✓', 'success');
  } catch(e) { toast('Save failed', 'error'); }
}

let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
