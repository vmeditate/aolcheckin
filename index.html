<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Art of Living · Event Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #FDF6F0;
    --card: #FFFFFF;
    --border: #E8DDD5;
    --text: #2C2C2C;
    --text-muted: #888;
    --accent: #C0622F;
    --accent-light: #F4E8DF;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .screen { display: none; }
  .screen.active { display: block; }
  #screen-setup { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1.25rem; }
  #screen-setup.active { display: flex; }

  /* SETUP */
  .setup-hero { text-align: center; margin-bottom: 2rem; }
  .lotus { font-size: 48px; display: block; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .setup-hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .setup-hero p  { font-size: 14px; color: var(--text-muted); }
  .setup-box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 420px; }
  .field { margin-bottom: 1.1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .field input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: #BFB0A8; }
  .hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
  .btn-start { width: 100%; max-width: 420px; margin-top: 1rem; padding: 13px; background: var(--accent); border: none; border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; }
  .btn-start:active { opacity: 0.85; }

  /* TOP BAR */
  .top-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 13px 1.25rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
  .top-bar .logo { font-size: 22px; }
  .top-bar-text { flex: 1; }
  .top-bar h1 { font-size: 15px; font-weight: 700; }
  .vol-chip { background: var(--accent-light); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--accent); cursor: pointer; white-space: nowrap; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }

  .main-body { padding: 1.25rem; }

  /* COUNTS */
  .counts-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 1.1rem; }
  .count-cell { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
  .count-cell .c-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 3px; }
  .count-cell .c-num { font-size: 20px; font-weight: 700; color: var(--text); }

  /* BUTTONS */
  .action-row { display: flex; gap: 8px; margin-bottom: 1.1rem; }
  .action-btn { flex: 1; padding: 9px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--card); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; text-align: center; }
  .action-btn:active { background: var(--accent-light); }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { width: 100%; padding: 11px 40px 11px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text); background: var(--card); outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: #BFB0A8; }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text-muted); cursor: pointer; display: none; background: none; border: none; padding: 4px; line-height: 1; }
  .clear-btn.visible { display: block; }

  /* GUEST CARD */
  .guest-list { display: flex; flex-direction: column; gap: 10px; }
  .guest-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .g-name { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .g-info { margin-bottom: 10px; }
  .g-info-row { font-size: 13px; color: var(--text-muted); margin-bottom: 3px; }
  .g-info-row span { font-weight: 600; color: var(--text); }
  .g-status-tag { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; background: var(--accent-light); color: var(--accent); }
  .g-status-tag.tag-arrived   { background: #E8F5E9; color: #2E7D32; }
  .g-status-tag.tag-noshow    { background: #FEECEC; color: #B71C1C; }
  .g-status-tag.tag-cancelled { background: #FFF8E1; color: #795548; }
  .g-by { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .g-by strong { color: var(--text); }
  .toggle-row { display: flex; gap: 6px; border-top: 1px solid var(--border); padding-top: 10px; }
  .tog { flex: 1; padding: 9px 4px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; color: var(--text-muted); text-align: center; transition: all 0.15s; }
  .tog:active { opacity: 0.8; }
  .tog.on-arrived   { background: #E8F5E9; border-color: #66BB6A; color: #2E7D32; }
  .tog.on-noshow    { background: #FEECEC; border-color: #EF9A9A; color: #B71C1C; }
  .tog.on-cancelled { background: #FFF8E1; border-color: #FFD54F; color: #795548; }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; line-height: 1.7; }
  .prompt-msg { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 14px; }

  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; font-size: 13px; font-weight: 600; padding: 9px 20px; border-radius: 30px; z-index: 999; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { background: #388E3C; }
  #toast.error   { background: #C62828; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="screen active">
  <div class="setup-hero">
    <span class="lotus">🪷</span>
    <h1>Art of Living</h1>
    <p>Event Check-In · Volunteer Portal</p>
  </div>
  <div class="setup-box">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="inp-vol" autocomplete="name"/>
    </div>
    <div class="field">
      <label>Apps Script Web App URL</label>
      <input type="url" id="inp-url"/>
      
    </div>
  </div>
  <button class="btn-start" onclick="startApp()">Start Check-In 🌸</button>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="top-bar">
    <span class="logo">🪷</span>
    <div class="top-bar-text"><h1>Event Check-In</h1></div>
    <div class="vol-chip" id="vol-chip" onclick="changeSetup()">👤 <span id="vol-name-label"></span></div>
  </div>

  <div class="main-body">

    <div class="counts-row">
      <div class="count-cell"><div class="c-lbl">Arrived</div><div class="c-num" id="ct-arrived">—</div></div>
      <div class="count-cell"><div class="c-lbl">Remaining</div><div class="c-num" id="ct-remaining">—</div></div>
      <div class="count-cell"><div class="c-lbl">No Show</div><div class="c-num" id="ct-noshow">—</div></div>
      <div class="count-cell"><div class="c-lbl">Cancelled</div><div class="c-num" id="ct-cancelled">—</div></div>
    </div>

    <div class="action-row">
      <button class="action-btn" onclick="refreshCounts()">🎲 Latest counts</button>
      <button class="action-btn" onclick="refreshList()">🔄 Refresh list</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="search" placeholder="Type a name to search…" oninput="onSearch(this.value)" autocomplete="off"/>
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
    </div>

    <div class="guest-list" id="guest-list">
      <div class="prompt-msg">Type a name above to find a guest.</div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
let vol = '', url = '', guests = [];

function startApp() {
  vol = document.getElementById('inp-vol').value.trim();
  url = document.getElementById('inp-url').value.trim();
  if (!vol) { alert('Please enter your name.'); return; }
  if (!url || !url.startsWith('http')) { alert('Please enter a valid Apps Script URL.'); return; }
  localStorage.setItem('aol_vol', vol);
  localStorage.setItem('aol_url', url);
  document.getElementById('vol-name-label').textContent = vol;
  switchScreen('screen-main');
  refreshList();
  refreshCounts();
}

function changeSetup() {
  if (confirm('Go back to setup screen?')) switchScreen('screen-setup');
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

(function() {
  const sv = localStorage.getItem('aol_vol');
  const su = localStorage.getItem('aol_url');
  if (sv) document.getElementById('inp-vol').value = sv;
  if (su) document.getElementById('inp-url').value = su;
})();

async function api(params) {
  const r = await fetch(url + '?' + new URLSearchParams(params));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function refreshList() {
  const el = document.getElementById('guest-list');
  el.innerHTML = '<div class="empty"><span class="spinner"></span> Loading guests…</div>';
  try {
    const d = await api({ action: 'getGuests' });
    guests = d.guests || [];
    const q = document.getElementById('search').value.trim();
    if (q) renderSearch(q);
    else el.innerHTML = '<div class="prompt-msg">Type a name above to find a guest.</div>';
    refreshCounts();
    toast('Guest list loaded ✓', 'success');
  } catch(e) {
    el.innerHTML = '<div class="empty">Could not load guests.<br>Check your Apps Script URL.</div>';
    toast('Load failed', 'error');
  }
}

async function refreshCounts() {
  try {
    const d = await api({ action: 'getCounts' });
    document.getElementById('ct-arrived').textContent   = d.arrived   ?? '—';
    document.getElementById('ct-remaining').textContent = d.remaining ?? '—';
    document.getElementById('ct-noshow').textContent    = d.noshow    ?? '—';
    document.getElementById('ct-cancelled').textContent = d.cancelled ?? '—';
    toast('Counts refreshed ✓', 'success');
  } catch(e) { toast('Could not fetch counts', 'error'); }
}

function onSearch(val) {
  document.getElementById('clear-btn').classList.toggle('visible', val.length > 0);
  if (!val.trim()) {
    document.getElementById('guest-list').innerHTML = '<div class="prompt-msg">Type a name above to find a guest.</div>';
    return;
  }
  renderSearch(val.trim());
}

function clearSearch() {
  const inp = document.getElementById('search');
  inp.value = '';
  document.getElementById('clear-btn').classList.remove('visible');
  document.getElementById('guest-list').innerHTML = '<div class="prompt-msg">Type a name above to find a guest.</div>';
  inp.focus();
}

function scoreMatch(name, query) {
  const n = name.toLowerCase();
  const q = query.toLowerCase();
  if (n === q) return 100;
  const words = q.split(/\s+/).filter(Boolean);
  if (words.every(w => n.includes(w))) return 90;
  if (n.startsWith(q)) return 85;
  const parts = n.split(/\s+/);
  if (parts.some(p => p.startsWith(q))) return 80;
  if (n.includes(q)) return 70;
  if (words.every(w => parts.some(p => p.startsWith(w)))) return 65;
  if (words.some(w => w.length >= 3 && n.includes(w))) return 40;
  return 0;
}

function renderSearch(query) {
  const el = document.getElementById('guest-list');
  if (!guests.length) {
    el.innerHTML = '<div class="empty">Guest list not loaded yet.<br>Tap Refresh list first.</div>';
    return;
  }
  const scored = guests
    .map(g => ({ g, score: scoreMatch(g.name, query) }))
    .filter(x => x.score >= 40)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  if (!scored.length) {
    el.innerHTML = '<div class="empty">No guest found matching <strong>"' + esc(query) + '"</strong>.<br>Try a different spelling.</div>';
    return;
  }
  el.innerHTML = scored.map(x => gCard(x.g)).join('');
}

function gCard(g) {
  const type = g.guestType || 'N/A';
  const tier = g.tier || 'N/A';
  const wb   = g.wristband || 'N/A';

  let statusTag = '';
  if (g.arrived)        statusTag = '<div class="g-status-tag tag-arrived">✓ Marked as Arrived</div>';
  else if (g.noshow)    statusTag = '<div class="g-status-tag tag-noshow">✗ Marked as No Show</div>';
  else if (g.cancelled) statusTag = '<div class="g-status-tag tag-cancelled">✗ Marked as Cancelled</div>';

  const byLine = g.checkedInBy
    ? `<div class="g-by">Checked in by <strong>${esc(g.checkedInBy)}</strong></div>` : '';

  return `
  <div class="guest-card" id="gc-${g.row}">
    <div class="g-name">${esc(g.name)}</div>
    <div class="g-info">
      <div class="g-info-row">Guest Type: <span>${esc(type)}</span></div>
      <div class="g-info-row">Tier: <span>${esc(tier)}</span></div>
      <div class="g-info-row">Wristband: <span>${esc(wb)}</span></div>
    </div>
    ${statusTag}
    ${byLine}
    <div class="toggle-row">
      <div class="tog ${g.arrived ? 'on-arrived' : ''}" onclick="toggle(${g.row},'arrived')">✓ Arrived</div>
      <div class="tog ${g.noshow ? 'on-noshow' : ''}" onclick="toggle(${g.row},'noshow')">No Show</div>
      <div class="tog ${g.cancelled ? 'on-cancelled' : ''}" onclick="toggle(${g.row},'cancelled')">Cancelled</div>
    </div>
  </div>`;
}

async function toggle(row, field) {
  const g = guests.find(x => x.row === row);
  if (!g) return;
  const newVal = !g[field];
  g.arrived = false; g.noshow = false; g.cancelled = false;
  g[field] = newVal;

  // Handle multiple volunteers: append name if not already listed
  if (newVal) {
    const existing = g.checkedInBy ? g.checkedInBy.split(',').map(n => n.trim()) : [];
    if (!existing.includes(vol)) existing.push(vol);
    g.checkedInBy = existing.join(', ');
  } else {
    g.checkedInBy = '';
  }

  const q = document.getElementById('search').value.trim();
  if (q) renderSearch(q);
  toast('Saving…');
  try {
    await api({ action: 'updateStatus', row, arrived: g.arrived?1:0, noshow: g.noshow?1:0, cancelled: g.cancelled?1:0, checkedInBy: g.checkedInBy });
    toast(newVal ? 'Saved ✓' : 'Cleared ✓', 'success');
  } catch(e) { toast('Save failed', 'error'); }
}

let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
